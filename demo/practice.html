<!doctype html>
<html lang="en">
<meta charset="utf-8">
<title>Marble — More practice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --ground:#f1f2ee;--card:#fbfbf8;--card2:#f4f5ef;--ink:#23271f;--soft:#5d6353;--faint:#8a9079;
    --line:#e1e3da;--line2:#eceee6;--moss:#4c7a34;--moss-soft:#e7eedd;--moss-ink:#33571f;--clay:#c07542;
    --disp:ui-rounded,"SF Pro Rounded","Segoe UI Rounded",system-ui,sans-serif;
    --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --ground:#14170f;--card:#1e241a;--card2:#232a1e;--ink:#eceee4;--soft:#9aa38c;--faint:#727a63;
    --line:#2c3326;--line2:#262d20;--moss:#8cc063;--moss-soft:#26311c;--moss-ink:#bfe0a2;--clay:#e0a075;
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--body);line-height:1.5;
    -webkit-font-smoothing:antialiased;padding:24px 16px 60px;display:flex;flex-direction:column;align-items:center}
  .wrap{width:100%;max-width:720px}
  h1{font-family:var(--disp);font-size:1.5rem;letter-spacing:-.02em;margin:0 0 2px}
  .sub{color:var(--soft);font-size:.9rem;margin:0 0 20px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:18px;
    display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
  .fld{display:flex;flex-direction:column;gap:5px}
  .fld label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
  select,input{font:inherit;font-size:1rem;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;background:var(--card2);color:var(--ink)}
  .qty{display:inline-flex;align-items:center;gap:14px;background:var(--card2);border:1.5px solid var(--line);border-radius:11px;padding:6px 10px}
  .qty button{width:30px;height:30px;border:0;border-radius:8px;background:var(--card);color:var(--ink);font-size:1.2rem;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .qty b{min-width:22px;text-align:center;font-variant-numeric:tabular-nums}
  button.act{font:inherit;font-weight:700;padding:12px 16px;border-radius:11px;border:0;cursor:pointer;font-size:.95rem}
  .primary{background:var(--moss);color:#fff}
  .ghost{background:var(--card2);color:var(--ink);border:1.5px solid var(--line)}
  button:active{transform:translateY(1px)}

  .sheet{background:#fff;color:#111;border:1px solid var(--line);border-radius:14px;padding:26px 28px;margin-bottom:16px}
  @media (prefers-color-scheme:dark){.sheet{border-color:#000}}
  .sheet .hd{display:flex;justify-content:space-between;align-items:baseline;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:18px}
  .sheet .hd .t{font-family:var(--disp);font-weight:800;font-size:1.15rem}
  .sheet .hd .m{font-size:.8rem;color:#555}
  .sheet .nmeta{display:flex;gap:26px;font-size:.85rem;color:#333;margin-bottom:20px}
  .sheet .nmeta span{border-bottom:1px solid #bbb;padding-bottom:2px;min-width:120px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 26px}
  .prob{font-size:1.25rem;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:8px}
  .prob .n{color:#888;font-size:.85rem;min-width:20px}
  .prob .q{font-family:var(--disp);font-weight:600}
  .prob .blank{flex:1;border-bottom:1.5px solid #999;min-width:34px;margin-left:4px}
  .key{margin-top:8px}
  .key h3{font-family:var(--disp);font-size:.95rem;margin:0 0 10px}
  .key .grid{gap:10px 26px}
  .key .prob{font-size:1rem}
  .key .a{font-weight:800;color:#111}
  .hint{font-size:.8rem;color:var(--soft);text-align:center;margin:2px 0 0}

  @media print{
    body{padding:0;background:#fff}
    .wrap{max-width:none}
    h1,.sub,.panel,.hint,.noprint{display:none!important}
    .sheet{border:0;border-radius:0;padding:0;margin:0}
    .sheet.worksheet{page-break-after:always}
  }
</style>
<div class="wrap">
  <h1>More practice 🌱</h1>
  <p class="sub">Fresh, never-repeating worksheets — generated by code, so the answer key is always right. Make as many as you want; every one is new.</p>

  <div class="panel noprint">
    <div class="fld">
      <label for="skill">Skill</label>
      <select id="skill">
        <option value="addSubWithin5">Adding &amp; subtracting within 5</option>
        <option value="addSubWithin10">Adding &amp; subtracting within 10</option>
        <option value="addSubWithin20">Adding &amp; subtracting within 20</option>
        <option value="numberBondsTo5">Number bonds to 5</option>
        <option value="numberBondsTo10">Number bonds to 10</option>
      </select>
    </div>
    <div class="fld">
      <label>Problems</label>
      <div class="qty"><button id="minus" type="button">−</button><b id="qtyv">12</b><button id="plus" type="button">+</button></div>
    </div>
    <button class="act primary" id="gen" type="button">Generate a fresh sheet</button>
    <button class="act ghost" id="again" type="button">New problems ↻</button>
    <button class="act ghost" id="print" type="button">Print / Save PDF</button>
  </div>

  <div class="sheet worksheet" id="worksheet"></div>
  <div class="sheet key" id="answerkey"></div>
  <p class="hint noprint">Tip: "Print / Save PDF" gives you page 1 = the worksheet (no answers), page 2 = the answer key.</p>
</div>

<script>
// ---- code generators (ported from scripts/generators.mjs — answers computed, never guessed) ----
function rng(seed){ let a=seed>>>0; return ()=>{ a|=0; a=(a+0x6d2b79f5)|0; let t=Math.imul(a^(a>>>15),1|a); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
const intIn=(r,lo,hi)=>lo+Math.floor(r()*(hi-lo+1));
function addSubWithin(max){ return (seed,count)=>{ const r=rng(seed); const items=[]; const seen=new Set(); let g=0;
  while(items.length<count && g++<count*40){ const op=r()<0.5?'+':'-'; let a,b,ans;
    if(op==='+'){ a=intIn(r,0,max); b=intIn(r,0,max-a); ans=a+b; } else { a=intIn(r,0,max); b=intIn(r,0,a); ans=a-b; }
    const k=`${a}${op}${b}`; if(seen.has(k)) continue; seen.add(k);
    items.push({prompt:`${a} ${op} ${b} =`, answer:ans}); }
  return items; }; }
function numberBonds(total){ return (seed,count)=>{ const r=rng(seed); const items=[];
  for(let i=0;i<count;i++){ const a=intIn(r,0,total); items.push({prompt:`${a} + ___ = ${total}`, answer:total-a}); }
  return items; }; }
const GENERATORS={ addSubWithin5:addSubWithin(5), addSubWithin10:addSubWithin(10), addSubWithin20:addSubWithin(20),
  numberBondsTo5:numberBonds(5), numberBondsTo10:numberBonds(10) };
const LABEL={ addSubWithin5:'Adding & subtracting within 5', addSubWithin10:'Adding & subtracting within 10',
  addSubWithin20:'Adding & subtracting within 20', numberBondsTo5:'Number bonds to 5', numberBondsTo10:'Number bonds to 10' };

let qty=12;
const $=s=>document.querySelector(s);
function randSeed(){ return Math.floor(Math.random()*1e9); }

function render(){
  const key=$('#skill').value;
  const seed=randSeed();
  const items=GENERATORS[key](seed, qty);
  const today=new Date().toLocaleDateString();
  // worksheet (no answers)
  $('#worksheet').innerHTML =
    `<div class="hd"><span class="t">${LABEL[key]}</span><span class="m">Marble · sheet #${String(seed).slice(-4)}</span></div>`
    + `<div class="nmeta"><span>Name:&nbsp;</span><span>Date: ${today}</span></div>`
    + `<div class="grid">` + items.map((it,i)=>
        `<div class="prob"><span class="n">${i+1}.</span><span class="q">${it.prompt}</span><span class="blank"></span></div>`).join('') + `</div>`;
  // answer key
  $('#answerkey').innerHTML =
    `<div class="key"><h3>Answer key — ${LABEL[key]} (sheet #${String(seed).slice(-4)})</h3>`
    + `<div class="grid">` + items.map((it,i)=>
        `<div class="prob"><span class="n">${i+1}.</span><span class="q">${it.prompt}</span> <span class="a">${it.answer}</span></div>`).join('') + `</div></div>`;
}

$('#minus').onclick=()=>{ qty=Math.max(4,qty-2); $('#qtyv').textContent=qty; render(); };
$('#plus').onclick=()=>{ qty=Math.min(40,qty+2); $('#qtyv').textContent=qty; render(); };
$('#skill').onchange=render;
$('#gen').onclick=render;
$('#again').onclick=render;
$('#print').onclick=()=>window.print();
render();
</script>
</html>
